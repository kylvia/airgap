name: Canary (version sentinel + synthetic pipeline)

# ─────────────────────────────────────────────────────────────────────────────
# WHY THIS EXISTS
#
# airgap reads and rewrites on-disk claude-code session files (~/.claude). Those
# formats are undocumented and can shift on any claude release. This workflow
# records the latest claude-code version every day and re-runs airgap's own
# pack/open pipeline against a synthetic session.
#
# WHAT A RED "canary" JOB MEANS
#   airgap's synthetic pipeline, dependency installation, or version-observation
#   step failed. The failure does not by itself prove a claude-code format change.
#   ACTION: inspect the failed step. When a new claude-code version was observed,
#   a human must separately check real `airgap open` load/resume compatibility and
#   inspect ~/.claude/projects/<munged>/*.jsonl for structural changes.
#
# NOTE: this workflow deliberately does NOT run `claude --resume` (that needs a
# paid, logged-in account). It installs claude-code only to (a) capture the
# current version number as a sentinel and (b) give maintainers a version to
# examine manually. All correctness assertions run against airgap's own
# synthetic fixture and pack/open pipeline.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Daily at 06:17 UTC. Odd minute to avoid the top-of-hour scheduling stampede.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canary
  cancel-in-progress: false

jobs:
  canary:
    name: latest version sentinel + synthetic airgap pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build airgap
        run: npm run build

      - name: Install latest claude-code
        run: npm i -g @anthropic-ai/claude-code@latest

      - name: Record claude-code version
        id: claude
        run: |
          set -euo pipefail
          VERSION="$(claude --version 2>/dev/null | head -n1 || echo 'unknown')"
          echo "Installed claude-code: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "### Canary run"
            echo ""
            echo "- latest claude-code version observed: \`$VERSION\`"
            echo "- format exercised by airgap: repository synthetic fixture"
          } >> "$GITHUB_STEP_SUMMARY"

      # This exercises airgap's own pack/open pipeline against a synthetic
      # Claude session. It does not create or resume a session with the installed
      # latest claude-code.
      - name: Run synthetic airgap pack/open regression
        run: bash scripts/canary-e2e.sh
        env:
          AIRGAP_ENTRY: ${{ github.workspace }}/dist/index.js

      - name: Canary summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Synthetic airgap pack/open regression passed; latest claude-code observed: \`${{ steps.claude.outputs.version }}\`. Real format compatibility was not exercised." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "🔴 **Canary RED** — the version sentinel or synthetic airgap pipeline failed while claude-code \`${{ steps.claude.outputs.version }}\` was observed."
              echo ""
              echo "Inspect the failed step. If this run observed a new claude-code release, manually check real \`airgap open\` load/resume compatibility before shipping."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
